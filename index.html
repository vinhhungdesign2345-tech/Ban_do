<!DOCTYPE html>
<html>
<head>
    <title>Bản Đồ Thửa Đất Thực Địa</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wicket/1.3.8/wicket.min.js"></script>
    <style>
        html, body, #map { height: 100%; margin: 0; padding: 0; }
        .popup-table { border-collapse: collapse; width: 100%; }
        .popup-table td { border: 1px solid #ddd; padding: 4px 8px; }
        .popup-table tr:nth-child(even){background-color: #f2f2f2;}
    </style>
</head>
<body>

<div id="map"></div>

<script>
    // 1. Khởi tạo bản đồ, mặc định tâm ở khu vực của bạn
    var map = L.map('map').setView([10.25, 105.18], 13);

    // 2. Thêm bản đồ nền Vệ tinh Google
    var googleSatellite = L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
        maxZoom: 20,
        subdomains: ['mt0', 'mt1', 'mt2', 'mt3']
    }).addTo(map);

    // 3. ĐƯỜNG LINK WEB APP GOOGLE SCRIPT CỦA BẠN
    // Thay link của bạn vào giữa hai dấu nháy dưới đây:
    var webAppUrl = "https://script.google.com/macros/s/AKfycbyXnmcP5otInN-bMe6AYC6xDqG1w6_iR0uBaD9JgpcJuPmVU78HaMzBId_uHz1JOfrL/exec";

    // 4. Tải dữ liệu từ Google Sheet và vẽ lên bản đồ
    fetch(webAppUrl)
        .then(response => response.json())
        .then(data => {
            if (data.error) {
                alert("Lỗi: " + data.error);
                return;
            }

            var wktUtil = new Wkt.Wkt();

            L.geoJSON(data, {
                style: function (feature) {
                    return {
                        color: "#e74c3c", // Viền màu đỏ
                        weight: 2,
                        fillColor: "#9b59b6", // Màu nền tím giống QGIS của bạn
                        fillOpacity: 0.5
                    };
                },
                onEachFeature: function (feature, layer) {
                    // Tạo bảng hiển thị thông tin khi bấm vào thửa đất
                    var popupContent = "<table class='popup-table'>";
                    for (var key in feature.properties) {
                        popupContent += "<tr><td><b>" + key + "</b></td><td>" + feature.properties[key] + "</td></tr>";
                    }
                    popupContent += "</table>";
                    layer.bindPopup(popupContent);
                }
            }).addTo(map);
        })
        .catch(error => console.error('Lỗi tải dữ liệu:', error));
</script>
</body>
</html>
