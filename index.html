<!DOCTYPE html>
<html>
<head>
    <title>Bản Đồ Thửa Đất Thực Địa (Popup Nhỏ Gọn)</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wicket/1.3.8/wicket.min.js"></script>
    <style>
        html, body, #map { height: 100%; margin: 0; padding: 0; }
        
        /* CẤU HÌNH POPUP NHỎ GỌN */
        .leaflet-popup-content {
            margin: 8px 10px; /* Thu hẹp lề popup */
            line-height: 1.2; /* Giảm khoảng cách dòng */
        }
        .popup-table { 
            border-collapse: collapse; 
            width: 100%; 
            font-size: 11px; /* CHỮ NHỎ LẠI */
            color: #444; /* Màu chữ nhẹ hơn */
        }
        .popup-table td { 
            border: 1px solid #eee; /* Đường viền mờ hơn */
            padding: 2px 4px; /* GIẢM LỀ TRONG CÁC Ô */
            vertical-align: top;
        }
        .popup-table b { 
            color: #333; 
            font-weight: 600; /* Giảm độ đậm chữ tiêu đề */
        }
        .popup-table tr:nth-child(even){background-color: #fafafa;}

        /* THU NHỎ ẢNH TRONG POPUP (Nếu có) */
        .popup-table img {
            max-width: 100px !important; /* Giới hạn ảnh rộng tối đa 100px */
            height: auto;
            border-radius: 2px;
            margin-top: 2px;
        }
        
        /* Cắt chữ dài, thêm ... (Cho ô giá trị) */
        .popup-value {
            display: inline-block;
            max-width: 150px; /* Giới hạn độ rộng chữ */
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script>
    var map = L.map('map').setView([10.25, 105.18], 13);

    var googleSatellite = L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
        maxZoom: 20,
        subdomains: ['mt0', 'mt1', 'mt2', 'mt3']
    }).addTo(map);

    // THAY LINK WEB APP CỦA BẠN VÀO ĐÂY (Link Google Apps Script)
    var webAppUrl = "https://script.google.com/macros/s/AKfycbyXnmcP5otInN-bMe6AYC6xDqG1w6_iR0uBaD9JgpcJuPmVU78HaMzBId_uHz1JOfrL/exec";

    // Hàm tiện ích để tạo một ô dữ liệu nhỏ gọn
    function createCompactCell(value) {
        // Nếu là ảnh (có thể kiểm tra theo tiêu đề cột, nhưng ở đây kiểm tra đơn giản)
        if (typeof value === 'string' && (value.startsWith('http') && (value.endsWith('.jpg') || value.endsWith('.png')))) {
            return '<img src="' + value + '" alt="Ảnh thửa đất"/>';
        }
        // Nếu là chữ quá dài, dùng class để cắt
        return '<span class="popup-value" title="' + value + '">' + value + '</span>';
    }

    fetch(webAppUrl)
        .then(response => response.json())
        .then(data => {
            if (data.error) { alert("Lỗi: " + data.error); return; }

            L.geoJSON(data, {
                style: { color: "#e74c3c", weight: 1.5, fillColor: "#9b59b6", fillOpacity: 0.4 },
                onEachFeature: function (feature, layer) {
                    var popupContent = "<table class='popup-table'>";
                    for (var key in feature.properties) {
                        popupContent += "<tr><td><b>" + key + "</b></td><td>" + createCompactCell(feature.properties[key]) + "http://googleusercontent.com/image_generation_content/0
